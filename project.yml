name: IIFAR
options:
  bundleIdPrefix: com.nakamura196
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"

packages:
  firebase-ios-sdk:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"
  GoogleSignIn-iOS:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "8.0.0"

settings:
  base:
    SWIFT_VERSION: "5.9"

targets:
  IIFAR:
    type: application
    platform: iOS
    sources:
      - path: IIFAR
    dependencies:
      - package: firebase-ios-sdk
        product: FirebaseAuth
      - package: firebase-ios-sdk
        product: FirebaseCrashlytics
      - package: firebase-ios-sdk
        product: FirebaseAnalytics
      - package: firebase-ios-sdk
        product: FirebasePerformance
      - package: GoogleSignIn-iOS
        product: GoogleSignIn
      - package: GoogleSignIn-iOS
        product: GoogleSignInSwift
    entitlements:
      path: IIFAR/IIFAR.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
    settings:
      base:
        INFOPLIST_FILE: IIFAR/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.nakamura196.iifar
        PRODUCT_NAME: "IIIF AR"
        MARKETING_VERSION: "1.1.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: "Q6S8JS6GWV"
        CODE_SIGN_STYLE: "Automatic"
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTED_PLATFORMS: "iphoneos"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: "NO"
    postBuildScripts:
      - name: Upload dSYMs to Crashlytics
        script: |
          "${BUILD_DIR%/Build/*}/SourcePackages/checkouts/firebase-ios-sdk/Crashlytics/run"
        inputFiles:
          - ${DWARF_DSYM_FOLDER_PATH}/${DWARF_DSYM_FILE_NAME}
          - ${DWARF_DSYM_FOLDER_PATH}/${DWARF_DSYM_FILE_NAME}/Contents/Resources/DWARF/${PRODUCT_NAME}
          - ${DWARF_DSYM_FOLDER_PATH}/${DWARF_DSYM_FILE_NAME}/Contents/Info.plist
          - $(TARGET_BUILD_DIR)/$(INFOPLIST_PATH)

  IIFARUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: IIFARUITests
    dependencies:
      - target: IIFAR
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nakamura196.iifar.uitests
        GENERATE_INFOPLIST_FILE: YES
        DEVELOPMENT_TEAM: "Q6S8JS6GWV"
        CODE_SIGN_STYLE: "Automatic"

schemes:
  IIFAR:
    build:
      targets:
        IIFAR: all
        IIFARUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: IIFAR/TipJar.storekit
    test:
      targets:
        - IIFARUITests
